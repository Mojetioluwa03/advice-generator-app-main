<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
  <title>advice-generator-app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main>
    <section class="advice-card" aria-label="Advice generator card">
      <p class="advice-card__id">Advice #<span id="advice-id">---</span></p>
      <blockquote class="advice-card__text" id="advice-text">Loading advice...</blockquote>

      <div class="divider" aria-hidden="true">
        <img src="./images/pattern-divider-mobile.svg" alt="" class="divider__img divider__img--mobile" />
        <img src="./images/pattern-divider-desktop.svg" alt="" class="divider__img divider__img--desktop" />
      </div>

      <button class="dice-button" id="new-advice" aria-label="Generate new advice">
        <img src="./images/icon-dice.svg" alt="Dice icon" />
      </button>
    </section>
  </main>

  <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. Coded by <a href="#">Your Name Here</a>.
  </footer> -->

  <script src="./js/script.js"></script>
</body>
</html>
